<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Sensasion</title>
    <link rel="icon" type="image/png" href="../public/assets/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #08152a 0%, #0d2144 50%, #154f85 100%);
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }

    .login-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--navy);
      text-align: center;
      margin-bottom: 6px;
    }

    .login-brand em { color: var(--sky); font-style: normal; }

    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }

    .login-icon-wrap {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--teal), var(--sky));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; color: white;
      margin: 0 auto 24px;
    }

    .show-pass {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer; padding: 4px;
      font-size: 1rem;
      transition: color .2s;
    }
    .show-pass:hover { color: var(--teal); }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--teal), var(--sky));
      color: white; border: none;
      padding: 13px;
      border-radius: var(--radius-sm);
      font-weight: 700; font-size: 0.95rem;
      cursor: pointer;
      transition: all .25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(12,126,196,0.4); }

    .error-box {
      background: rgba(239,68,68,0.1);
      color: #991b1b;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.86rem;
      font-weight: 600;
      margin-bottom: 18px;
      display: none;
    }

    .input-wrap { position: relative; }

    @media(max-width:480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon-wrap">
      <i class="bi bi-shield-lock"></i>
    </div>
    <div class="login-brand"><em>Sensasion</em> Admin</div>
    <div class="login-sub">Masuk ke panel admin untuk mengelola website</div>

    <div class="error-box" id="errorBox">
      <i class="bi bi-exclamation-circle"></i> <span id="errorMsg">Username atau password salah.</span>
    </div>

    <div class="form-group mb-3">
      <label class="form-label">Email / Username</label>
      <div class="input-wrap">
        <input
          type="text"
          id="username"
          class="form-control"
          placeholder="Email atau username"
          autocomplete="username"
          onkeydown="if(event.key==='Enter') doLogin()"
        />
      </div>
    </div>

    <div class="form-group mb-4">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="Masukkan password"
          autocomplete="current-password"
          style="padding-right:42px;"
          onkeydown="if(event.key==='Enter') doLogin()"
        />
        <button class="show-pass" type="button" onclick="togglePass()" id="toggleBtn" aria-label="Tampilkan password">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()" id="loginBtn">
      <i class="bi bi-box-arrow-in-right"></i> Masuk
    </button>

  </div>

<script src="../js/data.js"></script>
<script>

  if (window.history && window.history.pushState) {
    window.history.pushState(null, '', window.location.href);
    window.addEventListener('popstate', () => {
      window.history.pushState(null, '', window.location.href);
    });
  }

  localStorage.removeItem('sns_admin_logged');
  localStorage.removeItem('sns_admin_user');
  sessionStorage.removeItem('sns_admin_logged');

  (function() {
    const reason = localStorage.getItem('sns_logout_reason');
    if (reason === 'idle') {
      localStorage.removeItem('sns_logout_reason');
      const banner = document.createElement('div');
      banner.style.cssText = `
        position:fixed;top:18px;left:50%;transform:translateX(-50%);
        z-index:9999;background:#fff;border-radius:16px;
        padding:14px 22px;box-shadow:0 10px 40px rgba(0,0,0,.18);
        border-left:4px solid #f59e0b;display:flex;align-items:center;
        gap:12px;max-width:420px;width:90%;animation:slideDown .4s ease;`;
      banner.innerHTML = `
        <i class="bi bi-shield-lock" style="color:#f59e0b;font-size:1.4rem;flex-shrink:0;"></i>
        <div>
          <div style="font-weight:700;color:#08152a;font-size:.9rem;">Sesi Otomatis Berakhir</div>
          <div style="color:#5a7a96;font-size:.8rem;margin-top:2px;">Logout otomatis karena tidak aktif.</div>
        </div>
        <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#5a7a96;cursor:pointer;font-size:1.1rem;margin-left:auto;">
          <i class="bi bi-x-lg"></i>
        </button>`;
      const style = document.createElement('style');
      style.textContent = '@keyframes slideDown{from{opacity:0;transform:translate(-50%,-14px)}to{opacity:1;transform:translate(-50%,0)}}';
      document.head.appendChild(style);
      document.addEventListener('DOMContentLoaded', () => {
        document.body.appendChild(banner);
        setTimeout(() => { banner.style.transition='opacity .4s'; banner.style.opacity='0'; setTimeout(()=>banner.remove(),420); }, 5000);
      });
    }
  })();

  async function doLogin() {
    const emailOrUser = document.getElementById('username').value.trim();
    const password    = document.getElementById('password').value;
    const loginBtn    = document.getElementById('loginBtn');

    if (!emailOrUser || !password) {
      showError('Email/username dan password wajib diisi.');
      return;
    }

    loginBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Memeriksa...';
    loginBtn.disabled = true;

    try {
      const res  = await fetch('../api/users.php?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailOrUser, username: emailOrUser, password })
      });
      const data = await res.json();

      if (data.ok && data.user) {
        sessionStorage.setItem('sns_admin_logged', 'true');
        localStorage.setItem('sns_admin_logged', 'true');
        localStorage.setItem('sns_admin_user', JSON.stringify({
          id:          data.user.id,
          nama:        data.user.nama,
          email:       data.user.email,
          role:        data.user.role,
          foto_profil: data.user.foto_profil || null,
        }));
        loginBtn.innerHTML = '<i class="bi bi-check-lg"></i> Berhasil! Mengalihkan...';
        setTimeout(() => { location.replace('index.html'); }, 600);
        return;
      }

      showError(data.error || 'Email/username atau password salah.');
    } catch(e) {
      showError('Tidak dapat terhubung ke server. Coba lagi.');
    }

    loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
    loginBtn.disabled = false;
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    document.getElementById('errorMsg').textContent = msg;
    box.style.display = 'block';
    setTimeout(() => { box.style.display = 'none'; }, 4000);
  }

  function togglePass() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text'; icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password'; icon.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>
