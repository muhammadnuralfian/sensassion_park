<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri — Sensasion Admin</title>
    <link rel="icon" type="image/png" href="../public/assets/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="js/admin-layout.js"></script>
</head>
<body>
<script>
let currentEditId = null;
let previewGambar = '';

document.addEventListener('DOMContentLoaded', () => {
  renderAdminLayout('galeri.html', 'Manajemen Galeri');
  renderPage();
});

function renderPage() {
  const list = DB.get('galeri');
  const rows = list.length === 0
    ? `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:40px;">Belum ada item galeri.</td></tr>`
    : list.map(g => `
        <tr>
          <td>
            ${g.gambar
              ? `<img src="${g.gambar}" class="table-img" alt="${escHtml(g.judul)}">`
              : `<div class="table-img-empty"><i class="bi ${escHtml(g.icon||'bi-image')}"></i></div>`}
          </td>
          <td style="font-weight:600;color:var(--navy);">${escHtml(g.judul)}</td>
          <td>
            <span style="background:rgba(12,126,196,0.1);color:var(--teal);padding:3px 10px;border-radius:99px;font-size:.76rem;font-weight:600;text-transform:capitalize;">
              ${escHtml(g.kategori)}
            </span>
          </td>
          <td style="color:var(--muted);font-size:.83rem;">${escHtml(g.deskripsi?.slice(0,60))||'-'}</td>
          <td>
            <div class="d-flex gap-2">
              <button class="btn-edit" onclick="openEdit(${g.id})"><i class="bi bi-pencil"></i> Edit</button>
              <button class="btn-del" onclick="confirmDelete(${g.id},'${escHtml(g.judul)}')"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>`).join('');

  document.getElementById('adminContent').innerHTML = `
    <div class="page-actions">
      <div><h2 class="page-title">Manajemen Galeri</h2><p class="page-sub">Kelola foto dan item galeri</p></div>
      <button class="btn-add" onclick="openAdd()"><i class="bi bi-plus-lg"></i> Tambah Galeri</button>
    </div>
    <div class="admin-table-wrap" style="overflow-x:auto;">
      <table class="admin-table">
        <thead>
          <tr><th style="width:80px">Gambar</th><th>Judul</th><th>Kategori</th><th>Deskripsi</th><th style="width:140px">Aksi</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function openAdd() {
  currentEditId = null;
  previewGambar = '';
  showModal('Tambah Galeri', { judul:'', kategori:'umum', deskripsi:'', icon:'bi-image', gambar:'' });
}

function openEdit(id) {
  const g = DB.get('galeri').find(x => x.id === id);
  if (!g) return;
  currentEditId = id; previewGambar = g.gambar || '';
  showModal('Edit Galeri', g);
}

function showModal(title, g) {
  const cats = ['pemancingan','renang','fasilitas','aktivitas','umum'];
  openModal(`
    <div class="modal-box">
      <div class="modal-title">${title}</div>
      <div class="form-group">
        <label class="form-label">Judul *</label>
        <input id="gJudul" class="form-control" type="text" value="${escHtml(g.judul)}" placeholder="Judul foto" />
      </div>
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <select id="gKat" class="form-control">
          ${cats.map(c=>`<option value="${c}" ${g.kategori===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Deskripsi</label>
        <input id="gDesk" class="form-control" type="text" value="${escHtml(g.deskripsi)}" placeholder="Deskripsi singkat" />
      </div>
      <div class="form-group">
        <label class="form-label">Gambar (upload file)</label>
        <input type="file" id="gFile" class="form-control" accept="image/*" onchange="onGFile(event)" />
        <div id="gPreviewWrap" style="margin-top:8px;">
          ${g.gambar ? `<img src="${g.gambar}" class="img-preview">` : ''}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Icon Bootstrap (jika tanpa gambar)</label>
        <input id="gIcon" class="form-control" type="text" value="${escHtml(g.icon||'bi-image')}" placeholder="bi-fish" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Batal</button>
        <button class="btn-save" onclick="saveGaleri()"><i class="bi bi-check-lg"></i> Simpan</button>
      </div>
    </div>`);
}

function onGFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      previewGambar = canvas.toDataURL('image/jpeg', 0.75);
      const wrap = document.getElementById('gPreviewWrap');
      if (wrap) wrap.innerHTML = `<img src="${previewGambar}" class="img-preview">`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function saveGaleri() {
  const judul = document.getElementById('gJudul')?.value.trim();
  const kat   = document.getElementById('gKat')?.value;
  const desk  = document.getElementById('gDesk')?.value.trim();
  const icon  = document.getElementById('gIcon')?.value.trim() || 'bi-image';
  if (!judul) { showAdminAlert('Judul wajib diisi.', 'error'); return; }

  const data = DB.get('galeri');
  if (currentEditId !== null) {
    const idx = data.findIndex(g => g.id === currentEditId);
    if (idx !== -1) Object.assign(data[idx], { judul, kategori: kat, deskripsi: desk, icon, gambar: previewGambar || data[idx].gambar });
    showAdminAlert('Galeri berhasil diperbarui.');
  } else {
    data.push({ id: DB.newId('galeri'), judul, kategori: kat, deskripsi: desk, icon, gambar: previewGambar });
    showAdminAlert('Galeri berhasil ditambahkan.');
  }
  try {
    DB.set('galeri', data);
  } catch (err) {
    if (err.name === 'QuotaExceededError') {
      showAdminAlert('Penyimpanan penuh! Coba hapus beberapa gambar lama atau gunakan gambar berukuran lebih kecil.', 'error');
      return;
    }
    throw err;
  }
  closeModal();
  renderPage();
}

function confirmDelete(id, nama) {
  openModal(`
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-title" style="color:#ef4444;">Hapus Item Galeri?</div>
      <p style="color:var(--muted);margin-bottom:22px;">Yakin hapus <strong style="color:var(--navy);">${escHtml(nama)}</strong>?</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Batal</button>
        <button class="btn-danger-solid" onclick="doDelete(${id})"><i class="bi bi-trash"></i> Hapus</button>
      </div>
    </div>`);
}

function doDelete(id) {
  DB.set('galeri', DB.get('galeri').filter(g => g.id !== id));
  showAdminAlert('Item galeri berhasil dihapus.');
  closeModal();
  renderPage();
}
</script>
</body>
</html>
