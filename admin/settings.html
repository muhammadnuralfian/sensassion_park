<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan — Sensasion Admin</title>
    <link rel="icon" type="image/png" href="../public/assets/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="js/admin-layout.js"></script>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderAdminLayout('settings.html', 'Pengaturan');

  const s = DB.get('settings');

  document.getElementById('adminContent').innerHTML = `
    <div class="page-actions">
      <div><h2 class="page-title">Pengaturan Website</h2><p class="page-sub">Kelola informasi umum Sensasion</p></div>
    </div>

    <div class="settings-grid">

      <!-- Kolom Kiri: Info Umum -->
      <div>
        <div class="admin-table-wrap p-4 mb-4">
          <div class="settings-section-title"><i class="bi bi-info-circle"></i> Informasi Umum</div>
          <div id="settAlert" style="display:none;" class="alert-box alert-success mb-3"></div>

          <div class="form-group">
            <label class="form-label">Nama Tempat *</label>
            <input id="sNama" class="form-control" type="text" value="${escHtml(s.nama_tempat)}" />
          </div>
          <div class="form-group">
            <label class="form-label">Tagline</label>
            <input id="sTagline" class="form-control" type="text" value="${escHtml(s.tagline)}" />
          </div>
          <div class="form-group">
            <label class="form-label">Lokasi</label>
            <input id="sLokasi" class="form-control" type="text" value="${escHtml(s.lokasi)}" placeholder="Kota, Provinsi" />
          </div>
          <div class="settings-row-2">
            <div class="form-group">
              <label class="form-label">Jam Buka</label>
              <input id="sJam" class="form-control" type="text" value="${escHtml(s.jam_buka)}" placeholder="09.00 – 18.00 WITA" />
            </div>
            <div class="form-group">
              <label class="form-label">Hari Libur</label>
              <input id="sLibur" class="form-control" type="text" value="${escHtml(s.hari_libur)}" placeholder="Senin & Hari Besar" />
            </div>
          </div>
          <div class="settings-row-2">
            <div class="form-group">
              <label class="form-label">Pengelola</label>
              <input id="sPengelola" class="form-control" type="text" value="${escHtml(s.pengelola)}" />
            </div>
            <div class="form-group">
              <label class="form-label">Tahun Berdiri</label>
              <input id="sTahun" class="form-control" type="text" value="${escHtml(s.tahun_berdiri)}" placeholder="2020" />
            </div>
          </div>

          <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">
            <button class="btn-save" onclick="saveSettings()"><i class="bi bi-check-lg"></i> Simpan Pengaturan</button>
            <button class="btn-cancel" onclick="resetSettings()"><i class="bi bi-arrow-counterclockwise"></i> Reset Default</button>
          </div>
        </div>
      </div>

      <!-- Kolom Kanan: Kontak & Password -->
      <div>
        <div class="admin-table-wrap p-4 mb-4">
          <div class="settings-section-title"><i class="bi bi-share"></i> Kontak & Sosial Media</div>
          <div class="form-group">
            <label class="form-label">Nomor WhatsApp</label>
            <div style="position:relative;">
              <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;"><i class="bi bi-whatsapp" style="color:#22c55e;"></i></span>
              <input id="sWa" class="form-control" type="text" value="${escHtml(s.whatsapp)}" placeholder="628xxx" style="padding-left:34px;" />
            </div>
            <small style="color:var(--muted);font-size:.75rem;">Format: 628xxxxxxxxxx (tanpa + atau spasi)</small>
          </div>
          <div class="form-group">
            <label class="form-label">Instagram</label>
            <div style="position:relative;">
              <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;"><i class="bi bi-instagram" style="color:#e1306c;"></i></span>
              <input id="sIg" class="form-control" type="text" value="${escHtml(s.instagram)}" placeholder="@namaakun" style="padding-left:34px;" />
            </div>
          </div>
        </div>

      </div>

    </div>`;
});

function saveSettings() {
  const s = {
    nama_tempat:   document.getElementById('sNama').value.trim(),
    tagline:       document.getElementById('sTagline').value.trim(),
    whatsapp:      document.getElementById('sWa').value.trim(),
    instagram:     document.getElementById('sIg').value.trim(),
    lokasi:        document.getElementById('sLokasi').value.trim(),
    jam_buka:      document.getElementById('sJam').value.trim(),
    hari_libur:    document.getElementById('sLibur').value.trim(),
    pengelola:     document.getElementById('sPengelola').value.trim(),
    tahun_berdiri: document.getElementById('sTahun').value.trim(),
  };
  if (!s.nama_tempat) { showAdminAlert('Nama tempat wajib diisi.', 'error'); return; }
  DB.set('settings', s);
  showAdminAlert('Pengaturan berhasil disimpan.');
}

function resetSettings() {
  if (!confirm('Reset semua pengaturan ke default? Data yang ada akan hilang.')) return;
  localStorage.removeItem('sns_settings');
  location.reload();
}

</script>
</body>
</html>
