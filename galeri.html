<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri — Sensasion</title>
    <link rel="icon" type="image/png" href="public/assets/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <div><h1>Galeri Foto</h1><p>Keindahan dan keseruan di Sensasion</p></div>
</div>

<section class="section-pad">
  <div class="container">
    <div class="text-center mb-4">
      <div class="section-label">Galeri</div>
      <h2 class="section-title">Momen Bersama Kami</h2>
    </div>
    <div class="d-flex gap-2 flex-wrap justify-content-center mb-4">
      <button class="filter-btn active" data-filter="semua" onclick="filterGaleri(this,'semua')">Semua</button>
      <button class="filter-btn" data-filter="pemancingan" onclick="filterGaleri(this,'pemancingan')">Pemancingan</button>
      <button class="filter-btn" data-filter="renang" onclick="filterGaleri(this,'renang')">Renang</button>
      <button class="filter-btn" data-filter="fasilitas" onclick="filterGaleri(this,'fasilitas')">Fasilitas</button>
      <button class="filter-btn" data-filter="aktivitas" onclick="filterGaleri(this,'aktivitas')">Aktivitas</button>
    </div>
    <div class="row g-4" id="galeriGrid"></div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script>
let allGaleri = [];

function renderGaleri(filter='semua') {
  const grid = document.getElementById('galeriGrid');
  if (!grid) return;
  const list = filter==='semua' ? allGaleri : allGaleri.filter(g => g.kategori===filter);
  grid.innerHTML = list.map(g => `
    <div class="col-lg-3 col-md-4 col-sm-6">
      <div class="sns-card fade-up">
        ${g.gambar
          ? `<img src="${g.gambar}" alt="${escHtml(g.judul)}" class="fasilitas-img">`
          : `<div class="galeri-thumb">${renderIcon(g.icon)}</div>`}
        <div class="p-3">
          <div style="font-weight:700;font-size:.9rem;color:var(--navy);">${escHtml(g.judul)}</div>
          <div style="font-size:.78rem;color:var(--muted);text-transform:capitalize;margin-top:2px;">${g.kategori}</div>
        </div>
      </div>
    </div>`).join('');
  initFadeUp();
}

function filterGaleri(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGaleri(filter);
}

document.addEventListener('DOMContentLoaded', () => {
  allGaleri = DB.get('galeri');
  renderGaleri();
});
</script>
</body>
</html>
