<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fasilitas — Sensasion</title>
    <link rel="icon" type="image/png" href="public/assets/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <div><h1>Fasilitas Kami</h1><p>Lengkap, bersih, dan nyaman untuk seluruh keluarga</p></div>
</div>

<section class="section-pad">
  <div class="container">
    <div class="text-center mb-5">
      <div class="section-label">Fasilitas</div>
      <h2 class="section-title">Semua Fasilitas <em style="color:var(--sky);font-style:normal;">Sensasion</em></h2>
      <p class="section-sub">Setiap fasilitas dirancang untuk memberikan pengalaman wisata terbaik bagi keluarga Anda</p>
    </div>
    <div class="row g-4" id="fasilitasGrid"></div>
    <div class="mt-5">
      <div class="cta-section" style="display:flex;align-items:center;justify-content:space-between;gap:24px;text-align:left;flex-wrap:wrap;">
        <div>
          <h3 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px;">Tertarik Berkunjung?</h3>
          <p id="ctaJam" style="color:rgba(255,255,255,.6);margin:0;font-size:.93rem;">Buka setiap hari 09.00 – 18.00. Tutup Senin &amp; Hari Besar.</p>
        </div>
        <a href="reservasi.html" class="btn-primary-sns" style="flex-shrink:0;white-space:nowrap;">
          <i class="bi bi-calendar-check"></i> Reservasi Sekarang
        </a>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const s = DB.get('settings');
  const ctaJam = document.getElementById('ctaJam');
  if (ctaJam) ctaJam.textContent = `Buka setiap hari ${s.jam_buka}. Tutup ${s.hari_libur}.`;

  const grid = document.getElementById('fasilitasGrid');
  if (!grid) return;
  function renderFasilitas() {
    const list = DB.get('fasilitas');
    grid.innerHTML = list.map(f => `
      <div class="col-lg-3 col-md-6 col-sm-6">
        <div class="sns-card fade-up">
          ${f.gambar
            ? `<img src="${f.gambar}" alt="${escHtml(f.nama_fasilitas)}" class="fasilitas-img">`
            : `<div class="fasilitas-img-placeholder"><i class="bi bi-image"></i></div>`}
          <div class="p-3">
            <div class="fasilitas-name">${escHtml(f.nama_fasilitas)}</div>
            <div class="fasilitas-desc">${escHtml(f.deskripsi)}</div>
          </div>
        </div>
      </div>`).join('');
    initFadeUp();
  }
  renderFasilitas();
  window.addEventListener('db:updated', e => { if (e.detail.key==='fasilitas') renderFasilitas(); });
});
</script>
</body>
</html>
