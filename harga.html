<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harga — Sensasion</title>
    <link rel="icon" type="image/png" href="public/assets/favicon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <div><h1>Daftar Harga</h1><p>Harga terjangkau untuk pengalaman wisata terbaik</p></div>
</div>

<section class="section-pad">
  <div class="container">
    <div class="text-center mb-5">
      <div class="section-label">Harga</div>
      <h2 class="section-title">Tiket &amp; Layanan</h2>
      <p class="section-sub">Semua harga sudah termasuk fasilitas dasar. Tidak ada biaya tersembunyi.</p>
    </div>
    <div class="row g-4 justify-content-center" id="hargaGrid"></div>
    <div class="mt-5">
      <div class="cta-section" style="display:flex;align-items:center;justify-content:space-between;gap:24px;text-align:left;flex-wrap:wrap;">
        <div>
          <h3 style="font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:8px;">Harga Bisa Berubah</h3>
          <p style="color:rgba(255,255,255,.6);font-size:.92rem;max-width:480px;margin:0;">Hubungi kami untuk harga paket grup, gathering, atau lomba mancing.</p>
        </div>
        <a id="hargaWa" href="#" target="_blank" class="btn-primary-sns" style="flex-shrink:0;white-space:nowrap;">
          <i class="bi bi-whatsapp"></i> Tanya via WhatsApp
        </a>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<style>
  .harga-img-card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-shadow: 0 8px 32px rgba(8,21,42,0.18);
    transition: transform .3s, box-shadow .3s;
    background: #0d2144;
  }
  .harga-img-card:hover { transform: translateY(-6px); box-shadow: 0 18px 48px rgba(8,21,42,0.28); }
  .harga-img-card .harga-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform .4s;
  }
  .harga-img-card:hover .harga-bg { transform: scale(1.05); }
  .harga-img-card .harga-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,21,42,0.88) 0%, rgba(8,21,42,0.45) 55%, rgba(8,21,42,0.15) 100%);
  }
  .harga-img-card .harga-body {
    position: relative; z-index: 2;
    padding: 28px 24px 24px;
    color: #fff;
  }
  .harga-img-card .harga-nama {
    font-family: 'Playfair Display', serif;
    font-size: 1.18rem; font-weight: 700;
    margin-bottom: 6px; color: #fff;
  }
  .harga-img-card .harga-price {
    font-size: 1.55rem; font-weight: 800;
    color: #2eb5ff; margin-bottom: 4px;
    line-height: 1.1;
  }
  .harga-img-card .harga-satuan {
    font-size: .78rem; color: rgba(255,255,255,.65);
    font-weight: 600; margin-bottom: 8px;
  }
  .harga-img-card .harga-note {
    font-size: .8rem; color: rgba(255,255,255,.55);
    line-height: 1.5;
  }
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const s = DB.get('settings');
  const waBtn = document.getElementById('hargaWa');
  if (waBtn) waBtn.href = `https://wa.me/${s.whatsapp}?text=${encodeURIComponent('Halo, saya ingin tanya harga paket Sensasion!')}`;

  const grid = document.getElementById('hargaGrid');
  if (!grid) return;
  const list = DB.get('harga').filter(h => h.aktif);

  
  const defaultImgs = [
    'https://images.unsplash.com/photo-1562774053-701939374585?w=600&q=80',
    'https://images.unsplash.com/photo-1500463959177-e0869687df26?w=600&q=80',
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80',
    'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=600&q=80',
    'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=600&q=80',
  ];

  grid.innerHTML = list.map((h, i) => {
    const img = h.gambar || defaultImgs[i % defaultImgs.length];
    return `
    <div class="col-lg-4 col-md-6 col-sm-6 d-flex">
      <div class="harga-img-card w-100 fade-up">
        <div class="harga-bg" style="background-image:url('${escHtml(img)}')"></div>
        <div class="harga-overlay"></div>
        <div class="harga-body">
          <div class="harga-nama">${escHtml(h.nama)}</div>
          <div class="harga-price">${formatRupiah(h.harga)}</div>
          <div class="harga-satuan">${escHtml(h.satuan)}</div>
          <div class="harga-note">${escHtml(h.catatan)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  initFadeUp();
});
</script>
</body>
</html>
