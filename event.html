<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event — Sensasion</title>
    <link rel="icon" type="image/png" href="public/assets/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="page-hero">
      <div>
        <h1>Event &amp; Aktivitas</h1>
        <p>Kegiatan seru yang bisa dinikmati bersama keluarga</p>
      </div>
    </div>

    <section class="section-pad">
      <div class="container">
        <div class="text-center mb-5">
          <div class="section-label">Event</div>
          <h2 class="section-title">Program &amp; Kegiatan</h2>
          <p class="section-sub">
            Berbagai event dan program menarik yang tersedia di Sensasion
          </p>
        </div>
        <div class="row g-4" id="eventGrid"></div>
        <div class="text-center mt-5">
          <p
            style="color: var(--muted); margin-bottom: 18px; font-size: 0.93rem"
          >
            Ingin ikut lomba atau booking acara privat?
          </p>
          <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="kontak.html" class="btn-primary-sns"
              ><i class="bi bi-envelope"></i> Hubungi Kami</a
            
            >
          </div>
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const grid = document.getElementById("eventGrid");
        if (!grid) return;
        const list = DB.get("event");
        grid.innerHTML = list
          .map(
            (ev) => `
    <div class="col-md-6 col-lg-4">
      <div class="sns-card p-4 fade-up" style="height:100%;">
        <div class="event-icon">${renderIcon(ev.icon)}</div>
        <h5 style="font-family:'Playfair Display',serif;color:var(--navy);margin-bottom:10px;">${escHtml(ev.nama)}</h5>
        <p style="font-size:.87rem;color:var(--muted);line-height:1.65;margin-bottom:16px;">${escHtml(ev.deskripsi)}</p>
        <div class="d-flex gap-2 flex-wrap">
          <span class="event-badge"><i class="bi bi-clock"></i> ${escHtml(ev.jadwal)}</span>
          ${
            ev.biaya > 0
              ? `<span class="event-badge"><i class="bi bi-ticket"></i> ${formatRupiah(ev.biaya)}</span>`
              : `<span class="event-badge" style="background:rgba(34,197,94,0.1);color:#166534;">Gratis</span>`
          }
        </div>
      </div>
    </div>`,
          )
          .join("");
        initFadeUp();

        // Isi link WA dari data.js
        const btnWA = document.getElementById("btnDaftarWA");
        if (btnWA) {
          const siteData = DB.get("siteInfo") || {};
          const waNum = (siteData.whatsapp || "").replace(/\D/g, "");
          const waMsg = encodeURIComponent(
            "Halo Sensasion, saya ingin menanyakan informasi pendaftaran event. Bisa dibantu?",
          );
          btnWA.href = waNum
            ? `https://wa.me/${waNum}?text=${waMsg}`
            : "kontak.html";
        }
      });
    </script>
  </body>
</html>
